<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Rex Shop</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      background: #f9fafb;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 15px 25px;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5b21b6;
    }
  </style>
</head>

<body>

  <h1>🚀 Rex Shop</h1>
  <p>اربط متجرك مع سلة بسهولة</p>

  <button onclick="connectSalla()">
    🔗 ربط مع سلة
  </button>

  <script>
    function connectSalla() {
      const clientId = "7e42b932-6690-477d-aba0-a9fca78047e5";
      const redirectUri = "https://rex-shop-4.vercel.app/api/callback";

      const url = `https://accounts.salla.sa/oauth2/authorize?response_type=code&client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}`;

      window.location.href = url;
    }
  </script>

</body>
</html>
